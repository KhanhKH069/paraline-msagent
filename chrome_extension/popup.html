<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paraline Meet Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }

    body {
      width: 240px;
      background: #12121f;
      color: #e8e8f0;
      padding: 14px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .logo {
      font-size: 18px;
    }

    .title {
      font-size: 13px;
      font-weight: 700;
      color: #ff6b35;
      letter-spacing: 0.3px;
    }

    .subtitle {
      font-size: 10px;
      color: #555;
      margin-top: 1px;
    }

    .divider {
      height: 1px;
      background: #1e1e35;
      margin: 8px 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .label {
      font-size: 11px;
      color: #888;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .badge-ok      { background: #1a3a1a; color: #4caf50; }
    .badge-err     { background: #3a1a1a; color: #e53935; }
    .badge-idle    { background: #2a2a3a; color: #888; }
    .badge-meeting { background: #1e2a1e; color: #66bb6a; }

    .meet-code {
      font-size: 12px;
      color: #90caf9;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .footer {
      margin-top: 10px;
      font-size: 9px;
      color: #333;
      text-align: center;
    }

    .tip {
      font-size: 10px;
      color: #555;
      background: #1a1a2e;
      border-radius: 5px;
      padding: 6px 8px;
      line-height: 1.5;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🟠</span>
    <div>
      <div class="title">Paraline Meet Bridge</div>
      <div class="subtitle">Phiên dịch Google Meet</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="row">
    <span class="label">Bridge (Python)</span>
    <span class="badge" id="badge-bridge">Checking...</span>
  </div>

  <div class="row">
    <span class="label">Cuộc họp</span>
    <span class="badge" id="badge-meet">Chưa có</span>
  </div>

  <div class="row" id="meet-code-row" style="display:none">
    <span class="label">Meet code</span>
    <span class="meet-code" id="meet-code">—</span>
  </div>

  <div class="tip" id="tip-text">
    Mở trang meet.google.com để join cuộc họp. App Paraline sẽ tự bắt đầu phiên dịch.
  </div>

  <div class="footer">Paraline MSAgent v1.0</div>

  <script src="popup.js"></script>
</body>
</html>
