version: "3.9"

# Local-optimized compose:
# - Expose only what the Windows client needs (8056 + 8765)
# - Keep internal services private to the Docker network
# - Still includes Vision + Agent (as requested)

networks:
  paraline-net:
    driver: bridge

volumes:
  models-cache:
  postgres-data:
  redis-data:

services:
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: paraline-api-gateway
    ports:
      - "8056:8056" # REST + Swagger
      - "8765:8765" # WebSocket audio stream
    environment:
      - WHISPERLIVE_URL=http://whisperlive:8001
      - TRANSLATION_URL=http://translation-service:8002
      - TTS_URL=http://tts-service:8003
      - VISION_URL=http://vision-service:8004
      - AGENT_URL=http://agent-service:8005
      - COLLECTOR_URL=http://transcription-collector:8006
      - REDIS_URL=redis://redis:6379
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN}
      - CLIENT_API_KEY=${CLIENT_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - whisperlive
      - translation-service
      - tts-service
      - vision-service
      - agent-service
      - transcription-collector
      - redis
    networks: [paraline-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8056/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  whisperlive:
    build:
      context: ./services/whisperlive-wrapper
      dockerfile: Dockerfile
    container_name: paraline-whisperlive
    volumes:
      - models-cache:/models
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - MODEL_CACHE_DIR=/models/whisper
    networks: [paraline-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s

  translation-service:
    build:
      context: ./services/translation-service
      dockerfile: Dockerfile
    container_name: paraline-nllb
    volumes:
      - models-cache:/models
    environment:
      - NLLB_MODEL=${NLLB_MODEL:-facebook/nllb-200-distilled-600M}
      - MODEL_CACHE_DIR=/models/nllb
    networks: [paraline-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 60s
      start_period: 90s

  tts-service:
    build:
      context: ./services/tts-service
      dockerfile: Dockerfile
    container_name: paraline-piper
    volumes:
      - models-cache:/models
    environment:
      - PIPER_VOICE=${PIPER_VOICE:-vi_VN-vivos-medium}
      - MODEL_CACHE_DIR=/models/piper
      - SAMPLE_RATE=22050
    networks: [paraline-net]
    restart: unless-stopped

  vision-service:
    build:
      context: ./services/vision-service
      dockerfile: Dockerfile
    container_name: paraline-vision
    volumes:
      - models-cache:/models
    environment:
      - OCR_LANG=${OCR_LANG:-japan}
      - INPAINT_ENGINE=${INPAINT_ENGINE:-opencv}
      - TRANSLATION_URL=http://translation-service:8002
      - MODEL_CACHE_DIR=/models
      - FONT_PATH=/models/fonts/NotoSansCJK-Regular.ttc
    depends_on: [translation-service]
    networks: [paraline-net]
    restart: unless-stopped

  transcription-collector:
    build:
      context: ./services/transcription-collector
      dockerfile: Dockerfile
    container_name: paraline-collector
    environment:
      - DATABASE_URL=postgresql://paraline:${DB_PASSWORD:-paraline}@postgres:5432/paraline
      - REDIS_URL=redis://redis:6379
    depends_on: [postgres, redis]
    networks: [paraline-net]
    restart: unless-stopped

  agent-service:
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    container_name: paraline-agent
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL:-llama3:8b}
      - COLLECTOR_URL=http://transcription-collector:8006
    depends_on: [ollama, transcription-collector]
    networks: [paraline-net]
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: paraline-ollama
    volumes:
      - models-cache:/root/.ollama
    networks: [paraline-net]
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: paraline-postgres
    environment:
      POSTGRES_USER: paraline
      POSTGRES_PASSWORD: ${DB_PASSWORD:-paraline}
      POSTGRES_DB: paraline
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/database/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [paraline-net]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: paraline-redis
    volumes:
      - redis-data:/data
    networks: [paraline-net]
    restart: unless-stopped

